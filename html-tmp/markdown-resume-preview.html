<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Markdown 简历排版预览</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg-app: #edf1f5;
      --bg-panel: #f5f7fa;
      --bg-panel-card: #ffffff;
      --bg-preview: #e5e9ef;
      --border-light: #e2e8f0;
      --border-dark: #cbd5e1;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-placeholder: #94a3b8;
      --accent: #0ea5e9;
      --accent-hover: #0284c7;
      --accent-soft: #e0f2fe;
      --accent-muted: #bae6fd;
      --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px -2px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-glow: 0 0 0 3px rgba(14, 165, 233, 0.18);
      --shadow-panel: 4px 0 24px -4px rgba(15, 23, 42, 0.06);
      --radius-lg: 8px;
      --radius-md: 8px;
      --radius-sm: 6px;
      --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --header-bar-height: 72px;
      --panel-width: 460px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body {
      background: var(--bg-app);
      color: var(--text-main);
      font-family: var(--font-ui);
      overflow: hidden;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .app { display: flex; height: 100dvh; min-height: 100dvh; }

    .editor-panel {
      flex: 0 0 var(--panel-width);
      width: var(--panel-width);
      background: var(--bg-panel);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      z-index: 10;
      box-shadow: 8px 0 30px -22px rgba(15, 23, 42, 0.35);
      overflow: hidden;
      transition: flex-basis 0.24s ease, width 0.24s ease, transform 0.24s ease, opacity 0.18s ease;
      will-change: width, transform;
    }

    .panel-toggle-btn {
      position: fixed;
      top: calc(var(--header-bar-height) + env(safe-area-inset-top, 0px) + 14px);
      left: calc(var(--panel-width) - 16px);
      z-index: 40;
      height: 34px;
      min-width: 34px;
      padding: 0 11px;
      border: 1px solid var(--border-light);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-main);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: left 0.24s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }
    .panel-toggle-btn:hover {
      color: var(--accent);
      border-color: var(--accent-muted);
      background: #fff;
      transform: translateY(-1px);
    }
    .panel-toggle-icon {
      font-size: 18px;
      line-height: 1;
      transform: translateY(-1px);
    }
    .app.panel-collapsed .editor-panel {
      flex-basis: 0;
      width: 0;
      opacity: 0;
      transform: translateX(-100%);
      pointer-events: none;
      border-right: none;
      box-shadow: none;
    }
    .app.panel-collapsed .panel-toggle-btn {
      left: 14px;
    }

    .panel-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      height: calc(var(--header-bar-height) + env(safe-area-inset-top, 0px));
      min-height: calc(var(--header-bar-height) + env(safe-area-inset-top, 0px));
      padding: env(safe-area-inset-top, 0px) 20px 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.96)),
        radial-gradient(circle at 12% 24%, var(--accent-soft), transparent 32%);
      border-bottom: 1px solid var(--border-light);
      position: relative;
    }
    .panel-brand::after {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-muted), transparent);
      pointer-events: none;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: linear-gradient(145deg, #0f766e 0%, #0ea5e9 55%, #6366f1 100%);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
      flex-shrink: 0;
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .brand-name { font-size: 17px; font-weight: 800; letter-spacing: 0; line-height: 1.2; }
    .brand-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .brand-desc::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.25);
    }

    .panel-body {
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      overflow-y: auto;
    }

    .panel-card {
      background: var(--bg-panel-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .panel-card--export {
      margin-top: auto;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-color: var(--accent-muted);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-title-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .panel-title-icon svg { width: 15px; height: 15px; }
    .panel-title-hint {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin: -6px 0 2px 38px;
      line-height: 1.45;
    }

    .panel-title-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .theme-context {
      border: 1px solid var(--accent-muted);
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent-soft), rgba(255, 255, 255, 0.88));
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .theme-context-top { display: flex; align-items: center; gap: 8px; }
    .theme-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent-muted);
      font-size: 10px;
      font-weight: 700;
    }
    .theme-context-title {
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .theme-context-desc { font-size: 11px; color: var(--text-muted); line-height: 1.45; }
    .theme-config-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .theme-config-chips span {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.28);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
    }

    .theme-select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 0 36px 0 14px;
      background-color: #f8fafc;
      outline: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%230ea5e9%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 18px;
    }
    .theme-select:focus { border-color: var(--accent); background-color: #fff; box-shadow: var(--shadow-glow); }

    .field-group { display: flex; flex-direction: column; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field label svg { width: 13px; height: 13px; color: var(--accent); opacity: 0.85; }
    .field-note { font-size: 11px; color: var(--text-muted); line-height: 1.4; margin-top: -2px; }
    .field input,
    .field select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 0 12px;
      background: #f8fafc;
      outline: none;
      font-size: 14px;
      font-family: inherit;
    }
    .field select {
      appearance: none;
      cursor: pointer;
      background-image: linear-gradient(45deg, transparent 50%, var(--accent) 50%), linear-gradient(135deg, var(--accent) 50%, transparent 50%);
      background-position: calc(100% - 16px) 17px, calc(100% - 11px) 17px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
    .field input:focus,
    .field select:focus { border-color: var(--accent); background-color: #fff; box-shadow: var(--shadow-glow); }
    .field textarea {
      width: 100%; min-height: 72px; border: 1px solid var(--border-light);
      border-radius: var(--radius-sm); padding: 10px 12px; background: #f8fafc;
      outline: none; font-size: 13px; font-family: inherit; line-height: 1.55; resize: vertical;
    }
    .field textarea:focus { border-color: var(--accent); background: #fff; box-shadow: var(--shadow-glow); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-section { display: flex; flex-direction: column; gap: 12px; }
    .form-section-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .form-section-title { font-size: 12px; font-weight: 800; color: var(--text-main); letter-spacing: 0.02em; }
    .entry-card {
      border: 1px solid var(--border-light); border-radius: var(--radius-sm);
      padding: 12px; background: #fafbfc; display: flex; flex-direction: column; gap: 10px;
    }
    .entry-card-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .entry-card-label { font-size: 11px; font-weight: 700; color: var(--text-muted); }
    .btn-mini {
      height: 28px; padding: 0 10px; border-radius: 6px; border: 1px solid var(--border-light);
      background: #fff; color: var(--text-muted); font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; flex-shrink: 0;
    }
    .btn-mini:hover { border-color: var(--accent-muted); color: var(--accent); }
    .btn-mini--danger:hover { border-color: #fecaca; color: #dc2626; }
    .btn-mini--primary {
      border-color: var(--accent-muted); color: var(--accent); background: var(--accent-soft);
    }
    #sourceEditor.active {
      min-height: calc(100dvh - var(--header-bar-height) - 138px);
    }
    #sourceEditor .field {
      flex: 1;
      min-height: 0;
    }
    .md-editor {
      min-height: clamp(620px, calc(100dvh - var(--header-bar-height) - 180px), 920px);
      height: clamp(620px, calc(100dvh - var(--header-bar-height) - 180px), 920px);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px; line-height: 1.6;
      resize: vertical;
    }
    .md-hint {
      font-size: 11px; color: var(--text-muted); line-height: 1.55;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--accent-soft); border: 1px solid var(--accent-muted);
    }
    .md-hint code {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10px; background: rgba(255,255,255,0.7);
      padding: 1px 4px; border-radius: 3px;
    }
    .form-toolbar { display: flex; gap: 8px; flex-wrap: wrap; }

    .editor-mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border-radius: var(--radius-md);
      background: #e2e8f0;
    }
    .editor-mode-tab {
      height: 34px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .editor-mode-tab.active {
      background: #fff;
      color: var(--text-main);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
    }
    .editor-mode-panel { display: none; }
    .editor-mode-panel.active {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .editor-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 2px;
    }
    .editor-block + .editor-block {
      border-top: 1px solid var(--border-light);
      padding-top: 16px;
    }
    .editor-block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .editor-block-title {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #334155;
    }
    .editor-block-count {
      min-width: 26px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent-muted);
      font-size: 10px;
      font-weight: 900;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .editor-grid .field--wide { grid-column: 1 / -1; }
    .section-list,
    .custom-meta-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .resume-section-item,
    .custom-meta-item {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      background: #fbfcfe;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-item-head,
    .custom-meta-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-drag-handle {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .section-title-input,
    .custom-meta-key {
      flex: 1;
      min-width: 0;
      height: 36px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 0 10px;
      background: #fff;
      outline: none;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
    }
    .section-title-input:focus,
    .custom-meta-key:focus { border-color: var(--accent); box-shadow: var(--shadow-glow); }
    .section-body {
      min-height: 116px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
    }
    .custom-meta-row {
      display: grid;
      grid-template-columns: minmax(90px, 0.8fr) minmax(0, 1.2fr);
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .custom-meta-value {
      min-width: 0;
      height: 36px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 0 10px;
      background: #fff;
      outline: none;
      font: inherit;
      font-size: 13px;
    }
    .custom-meta-value:focus { border-color: var(--accent); box-shadow: var(--shadow-glow); }
    .empty-state {
      padding: 16px;
      border: 1px dashed var(--border-dark);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      background: #f8fafc;
      font-size: 12px;
      text-align: center;
    }
    .source-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .source-status {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
    }

    .field-file {
      border: 1.5px dashed var(--border-dark);
      border-radius: var(--radius-md);
      padding: 20px 16px 16px;
      text-align: center;
      background: linear-gradient(180deg, #fafbff 0%, #f1f5f9 100%);
      cursor: pointer;
    }
    .field-file-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 10px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border-light);
      display: grid;
      place-items: center;
      color: var(--accent);
    }
    .field-file-icon svg { width: 20px; height: 20px; }
    .field-file-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .field-file-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }
    .field-file input[type="file"] {
      width: 100%;
      font-size: 12px;
      color: var(--text-muted);
      border: none;
      background: transparent;
    }
    .field-file input[type="file"]::file-selector-button {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent) 0%, #06b6d4 100%);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
      font-family: inherit;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
      font-family: inherit;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary svg { width: 18px; height: 18px; }
    .export-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-secondary {
      background: #ffffff;
      color: var(--accent);
      border: 1px solid var(--accent-muted);
      box-shadow: none;
    }
    .btn-primary-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      margin-top: -4px;
      line-height: 1.4;
    }

    .preview-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-preview);
      background-image: radial-gradient(var(--border-dark) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .preview-toolbar {
      flex-shrink: 0;
      height: calc(var(--header-bar-height) + env(safe-area-inset-top, 0px));
      min-height: calc(var(--header-bar-height) + env(safe-area-inset-top, 0px));
      padding: env(safe-area-inset-top, 0px) 24px 0;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
    }
    .preview-toolbar-inner {
      height: var(--header-bar-height);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      width: 100%;
    }
    .preview-status {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
    }
    .preview-status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.14);
    }
    .preview-theme-label {

      font-weight: 800;

      background: #e2e8f0;
      padding: 4px;
      border-radius: 10px;
      gap: 4px;

      display: flex;
      align-items: center;
      gap: 8px;

    .device-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      overflow: auto;
    }
    .device-view {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }

    .iphone-frame {
      width: min(380px, 100%);
      aspect-ratio: 390 / 844;
      height: auto;
      max-height: 100%;
      background: #0f172a;
      border-radius: 54px;
      padding: 12px;
      box-shadow: var(--shadow-lg), 0 0 0 1px #334155;
    }
    .iphone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 42px;
      overflow: hidden;
      background: #fff;
    }
    .iphone-dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 12;
    }
    .iphone-home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      border-radius: 10px;
      background: #000;
      z-index: 12;
      opacity: 0.8;
    }
    .iphone-screen iframe { width: 100%; height: 100%; border: none; display: block; }

    .pc-frame {
      width: min(1200px, 100%);
      height: min(800px, 100%);
      max-height: calc(100vh - 120px);
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
    }
    .pc-topbar {
      height: 48px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .window-btn { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .window-btn.close { background: #ef4444; }
    .window-btn.minimize { background: #f59e0b; }
    .window-btn.maximize { background: #10b981; }
    .pc-url {
      flex: 1;
      max-width: 400px;
      margin: 0 auto;
      height: 28px;
      border-radius: 6px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }
    .pc-url svg { width: 12px; height: 12px; margin-right: 6px; opacity: 0.6; }
    .pc-frame iframe { width: 100%; flex: 1; border: none; background: #ebe8e2; display: block; }

    @media (max-width: 860px) {
      body { overflow-x: hidden; overflow-y: auto; }
      .app { flex-direction: column; height: auto; overflow-x: hidden; }
      .editor-panel { width: 100%; flex: none; border-right: none; box-shadow: none; }
      .panel-toggle-btn { top: 14px; left: auto; right: 14px; }
      .app.panel-collapsed .editor-panel { display: none; }
      .app.panel-collapsed .panel-toggle-btn { left: auto; right: 14px; }
      #sourceEditor.active { min-height: auto; }
      .md-editor { min-height: 520px; height: 64dvh; }
      .panel-card--export { margin-top: 0; }
      .preview-panel { min-height: 80dvh; }
      .device-stage { padding: 24px 16px; }
      .preview-toolbar { padding-left: 16px; padding-right: 16px; }
      .preview-toolbar-inner { grid-template-columns: 1fr; justify-items: center; height: auto; min-height: var(--header-bar-height); padding: 10px 0; }
      .preview-status,
      .preview-theme-label { justify-self: center; }
    }

    @media (max-width: 520px) {

      .panel-title-actions { width: 100%; margin-left: 0; flex-wrap: wrap; }
      .panel-card--editor .panel-title { flex-wrap: wrap; }

      .section-item-head,

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "").trim();
      const full = normalized.length === 3 ? normalized.split("").map((c) => c + c).join("") : normalized;
      const value = Number.parseInt(full, 16);
      return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }

    function shadeHex(hex, amount) {
      const { r, g, b } = hexToRgb(hex);
      const clamp = (v) => Math.max(0, Math.min(255, v));
      const ch = (v) => clamp(v + amount).toString(16).padStart(2, "0");
      return `#${ch(r)}${ch(g)}${ch(b)}`;
    }

    function applyPanelAccent(accent) {
      const { r, g, b } = hexToRgb(accent);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accent-hover", shadeHex(accent, -24));
      document.documentElement.style.setProperty("--accent-soft", `rgba(${r}, ${g}, ${b}, 0.10)`);
      document.documentElement.style.setProperty("--accent-muted", `rgba(${r}, ${g}, ${b}, 0.28)`);
      document.documentElement.style.setProperty("--shadow-glow", `0 0 0 3px rgba(${r}, ${g}, ${b}, 0.18)`);
    }

    function applyThemeConfig() {
      const config = STYLE_PANEL_CONFIGS[themeSelect.value] || STYLE_PANEL_CONFIGS.professional;
      applyPanelAccent(config.accent);
      styleBadge.textContent = config.badge;
      styleSummaryTitle.textContent = config.title;
      styleSummaryDesc.textContent = config.desc;
      if (previewThemeLabel) previewThemeLabel.textContent = config.badge;
      styleConfigChips.replaceChildren(...config.chips.map((chip) => {
        const item = document.createElement("span");
        item.textContent = chip;
        return item;
      }));
    }

    function parseFrontmatter(text) {
      const match = String(text).match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
      if (!match) {
        return { meta: {}, body: String(text).trim() };
      }
      const meta = {};
      match[1].split("\n").forEach((line) => {
        const idx = line.indexOf(":");
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        const value = line.slice(idx + 1).trim();
        if (key) meta[key] = value;
      });
      return { meta, body: match[2].trim() };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseMarkdownSections(body) {
      const text = String(body || "").trim();
      if (!text) return [{ title: "个人简介", body: "" }];

      const sections = [];
      const headingRegex = /^##[ \t]+(.+?)\s*$/gm;
      let match;
      let currentTitle = "";
      let currentStart = 0;

      while ((match = headingRegex.exec(text))) {
        if (!currentTitle && match.index > 0) {
          const intro = text.slice(0, match.index).trim();
          if (intro) sections.push({ title: "开场内容", body: intro });
        }
        if (currentTitle) {
          sections.push({
            title: currentTitle,
            body: text.slice(currentStart, match.index).trim(),
          });
        }
        currentTitle = match[1].trim();
        currentStart = headingRegex.lastIndex;
      }

      if (currentTitle) {
        sections.push({ title: currentTitle, body: text.slice(currentStart).trim() });
      }

      if (!sections.length) {
        sections.push({ title: "正文", body: text });
      }

      return sections;
    }

    function buildBodyFromSections() {
      return resumeSections
        .map((section) => {
          const title = (section.title || "未命名章节").trim();
          const body = (section.body || "").trim();
          return `## ${title}${body ? `\n\n${body}` : ""}`;
        })
        .join("\n\n");
    }

    function readMetaFromForm() {
      const nextMeta = {};
      document.querySelectorAll("[data-meta-key]").forEach((input) => {
        nextMeta[input.dataset.metaKey] = input.value.trim();
      });
      customMetaEntries.forEach((entry) => {
        const key = (entry.key || "").trim();
        if (!key || KNOWN_META_KEYS.includes(key)) return;
        nextMeta[key] = (entry.value || "").trim();
      });
      nextMeta.theme = themeSelect.value;
      return nextMeta;
    }

    function readSectionsFromForm() {
      resumeSections = Array.from(sectionList.querySelectorAll(".resume-section-item")).map((item) => {
        const title = item.querySelector(".section-title-input")?.value || "";
        const body = item.querySelector(".section-body")?.value || "";
        return { title: title.trim(), body: body.trim() };
      });
    }

    function readCustomMetaFromForm() {
      customMetaEntries = Array.from(customMetaList.querySelectorAll(".custom-meta-item")).map((item) => ({
        key: item.querySelector(".custom-meta-key")?.value.trim() || "",
        value: item.querySelector(".custom-meta-value")?.value.trim() || "",
      }));
    }

    function serializeMarkdown() {
      const meta = readMetaFromForm();
      const orderedKeys = [
        ...KNOWN_META_KEYS,
        ...Object.keys(meta).filter((key) => !KNOWN_META_KEYS.includes(key)),
      ];
      const metaLines = [];
      const used = new Set();

      orderedKeys.forEach((key) => {
        if (!key || used.has(key)) return;
        used.add(key);
        const value = meta[key] ?? "";
        if (!KNOWN_META_KEYS.includes(key) && String(value).trim() === "") return;
        metaLines.push(`${key}: ${String(value).trim()}`);
      });

      resumeBody = buildBodyFromSections();
      return `---\n${metaLines.join("\n")}\n---\n\n${resumeBody}\n`;
    }

    function syncMarkdownFromEditor() {
      if (isRenderingEditor) return;
      readSectionsFromForm();
      readCustomMetaFromForm();
      resumeMeta = readMetaFromForm();
      markdownContent = serializeMarkdown();
      markdownEditor.value = markdownContent;
      sourceStatus.textContent = "Markdown 已同步";
      schedulePreview();
    }

    function commitActiveEditor() {
      if (activeEditorMode === "source") {

          sectionList.appendChild(item);

    function renderCustomMetaEditor() {
      customMetaList.innerHTML = "";
      if (!customMetaEntries.length) {
        customMetaList.innerHTML = '<div class="empty-state">暂无自定义字段</div>';

      customMetaEntries.forEach((entry, index) => {

        item.innerHTML = `

            </div>

          </div>
        `;
        customMetaList.appendChild(item);
      });
    }

    function renderEditor() {

    function applyResumeMarkdown(text, options = {}) {
      const { render = true } = options;
      markdownContent = text;
      const parsed = parseFrontmatter(text);
      resumeMeta = parsed.meta;
      resumeBody = parsed.body;
      resumeSections = parseMarkdownSections(resumeBody || markdownContent);
      customMetaEntries = Object.entries(resumeMeta)
        .filter(([key]) => !KNOWN_META_KEYS.includes(key))
        .map(([key, value]) => ({ key, value }));
      if (resumeMeta.theme && themeSelect.querySelector(`option[value="${resumeMeta.theme}"]`)) {
        themeSelect.value = resumeMeta.theme;
        applyThemeConfig();
      }
      if (render) renderEditor();
    }

    function sortTemplateFiles(files) {
      return [...new Set(files)].sort((a, b) => {
        if (a === DEFAULT_TEMPLATE) return -1;
        if (b === DEFAULT_TEMPLATE) return 1;
        return a.localeCompare(b, "zh-CN");
      });
    }

    function templateLabel(filename) {
      const base = filename.replace(/\.md$/i, "");
      const idx = base.lastIndexOf("-");
      if (idx <= 0) return base;
      const role = base.slice(0, idx);
      const person = base.slice(idx + 1);
      if (filename === DEFAULT_TEMPLATE) return `默认 · ${role} · ${person}`;
      return `${role} · ${person}`;
    }

    function parseDirectoryListing(html) {
      const files = [];
      const re = /href="([^"?#]+\.md)"/gi;
      let match;
      while ((match = re.exec(html)) !== null) {
        const raw = decodeURIComponent(match[1].replace(/\/$/, ""));
        const name = raw.split("/").pop();
        if (/\.md$/i.test(name) && name.includes("-") && !/^readme/i.test(name)) {
          files.push(name);
        }
      }
      return sortTemplateFiles(files);
    }

    async function loadTemplate(file, options = {}) {
      const { persist = true } = options;
      const target = file || currentTemplateFile || DEFAULT_TEMPLATE;
      const res = await fetch(`./${target}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`无法加载 ${target}`);
      currentTemplateFile = target;
      applyResumeMarkdown(await res.text());
      if (persist) {
        try { localStorage.setItem(TEMPLATE_STORAGE_KEY, target); } catch (_) {}
      }
      const templateSelect = document.getElementById("templateSelect");
      if (templateSelect && templateSelect.value !== target) {
        templateSelect.value = target;
      }
      const templateSelectHint = document.getElementById("templateSelectHint");
      if (templateSelectHint) {
        templateSelectHint.textContent = `已发现 ${templateFiles.length} 个模版 · 当前 ${currentTemplateFile}`;
      }
    }

            .resume-name { font-size: 36px; line-height: 1.1; font-weight: 900; color: #9a3412; letter-spacing: -0.04em; margin-bottom: 8px; }
            .resume-role { font-size: 14px; color: #ea580c; font-weight: 800; }
            .resume-contact { max-width: 260px; text-align: right; font-size: 12px; color: #78716c; line-height: 1.7; }
            .content { position: relative; padding-left: 26px; }
            .content::before { content: ""; position: absolute; top: 18px; bottom: 0; left: 6px; width: 2px; background: linear-gradient(180deg, #fb923c, #fed7aa); }
            .content h2 { position: relative; color: #c2410c; border-bottom: 1px solid #fed7aa; }
            .content h2::before { content: ""; position: absolute; left: -26px; top: 8px; width: 12px; height: 12px; border-radius: 50%; background: #f97316; box-shadow: 0 0 0 4px #ffedd5; }
            .content h3 { color: #7c2d12; }
            .content strong { color: #ea580c; }
            .content em { color: #78716c; }
            .content li::marker { color: #f97316; }
            .content pre { background: #fff7ed; color: #7c2d12; border: 1px solid #fed7aa; }
            .content code { background: #ffedd5; color: #c2410c; }
            body.mode-mobile { background: #fff; }
            body.mode-mobile .page { margin: 0; padding: 38px 24px 56px; border-radius: 0; box-shadow: none; }
            body.mode-mobile .resume-header { flex-direction: column; }
            body.mode-mobile .resume-contact { text-align: left; max-width: none; }
            body.mode-mobile .resume-name { font-size: 30px; }
            ${CONTENT_BASE}
          `,
          html: `
            <header class="resume-header">
              <div>
                <h1 class="resume-name">${name}</h1>
                <div class="resume-role">${role}</div>
              </div>
              <div class="resume-contact">${contact}</div>
            </header>
            <div class="content">${htmlContent}</div>
          `,
        },
      };

      return themes[theme] || themes.professional;
    }

    function generatePage(mode) {
      const isMobile = mode === "mobile";
      const name = escapeHtml(resumeMeta.name || "");
      const role = escapeHtml(resumeMeta.role || "");
      const contact = escapeHtml(buildContactLine(resumeMeta));
      const htmlContent = marked.parse(resumeBody || buildBodyFromSections() || "");
      const currentTheme = themeSelect.value;
      const { css: themeCSS, html: themeHTML } = buildTheme(currentTheme, name, role, contact, htmlContent, isMobile);

      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { overflow-x: hidden; max-width: 100%; }
.page { max-width: 100%; overflow-x: hidden; }
.content pre { max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
${themeCSS}
@media print {
  @page { margin: 10mm; size: A4; }
  html, body { overflow: visible !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { background: transparent !important; }
  .page { box-shadow: none !important; margin: 0 auto !important; min-height: auto !important; }
  .content h2, .content h3 { page-break-after: avoid; }
  .content pre, .content table, .content tr { page-break-inside: avoid; }
}
</style>
</head>
<body class="${isMobile ? "mode-mobile" : "mode-desktop"}">
<div class="page">${themeHTML}</div>
</body>
</html>`;
    }

    function initDevices() {
      DEVICES.forEach((device, index) => {
        const tab = deviceSwitcher.querySelector(`[data-device="${device.id}"]`);
        if (tab) tab.addEventListener("click", () => switchDevice(device.id));
        const view = document.createElement("div");
        view.className = "device-view" + (index === 0 ? " is-active" : "");
        view.dataset.device = device.id;
        view.setAttribute("role", "tabpanel");
        view.innerHTML = device.frameHtml;
        deviceStage.appendChild(view);
      });
    }

    function switchDevice(id) {
      if (id === activeDeviceId) return;
      activeDeviceId = id;
      deviceSwitcher.querySelectorAll(".device-tab").forEach((tab) => {
        const isActive = tab.dataset.device === id;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      deviceStage.querySelectorAll(".device-view").forEach((view) => {
        view.classList.toggle("is-active", view.dataset.device === id);
      });
    }

    function updatePreview() {
      DEVICES.forEach((device) => {
        const iframe = deviceStage.querySelector(`.device-view[data-device="${device.id}"] iframe[data-preview]`);
        if (iframe) iframe.srcdoc = generatePage(device.mode);
      });
    }

    async function waitForFrameAssets(iframe) {
      const doc = iframe?.contentDocument;
      if (!doc) return;
      if (doc.fonts?.ready) {
        try { await doc.fonts.ready; } catch (_) {}
      }
      const pending = Array.from(doc.images || []).filter((img) => !img.complete);
      if (pending.length) {
        await Promise.allSettled(pending.map((img) => new Promise((resolve) => {
          img.addEventListener("load", resolve, { once: true });
          img.addEventListener("error", resolve, { once: true });
        })));
      }
    }

    function getExportFileName(ext) {
      const safe = (resumeMeta.name || "resume").trim()
        .replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-").slice(0, 60);
      return `${safe}.${ext}`;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function generateWordHtml() {
      const html = generatePage("desktop");
      const officeAttrs = 'xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"';
      const officeMeta = `<meta name="ProgId" content="Word.Document" />
<meta name="Generator" content="Markdown Resume Preview" />
<style>@page WordSection1 { size: 21cm 29.7cm; margin: 1.5cm; } div.WordSection1 { page: WordSection1; }</style>`;
      return html
        .replace('<html lang="zh-CN">', `<html lang="zh-CN" ${officeAttrs}>`)
        .replace("</head>", `${officeMeta}\n</head>`)
        .replace('<body class="mode-desktop">', '<body class="mode-desktop"><div class="WordSection1">')
        .replace("</body>", "</div></body>");
    }


    function setEditorPanelCollapsed(collapsed, options = {}) {
      if (!appRoot || !panelToggleBtn) return;
      appRoot.classList.toggle("panel-collapsed", collapsed);
      panelToggleBtn.setAttribute("aria-expanded", collapsed ? "false" : "true");
      panelToggleBtn.title = collapsed ? "展开左侧编辑区" : "收起左侧编辑区";
      if (panelToggleText) panelToggleText.textContent = collapsed ? "展开" : "收起";
      if (panelToggleIcon) panelToggleIcon.textContent = collapsed ? "›" : "‹";
      if (!options.skipPersist) {
        localStorage.setItem("resume-preview-panel-collapsed", collapsed ? "1" : "0");
      }
    }

    exportPdfBtn.addEventListener("click", async () => {
      commitActiveEditor();
      updatePreview();
      const pcIframe = document.getElementById("previewIframePc");
      if (pcIframe?.contentWindow) {
        await waitForFrameAssets(pcIframe);
        pcIframe.contentWindow.focus();
        setTimeout(() => pcIframe.contentWindow.print(), 50);
      } else {
        alert("未能找到预览窗口，请确认页面已加载。");
      }
    });

    exportWordBtn.addEventListener("click", async () => {
      commitActiveEditor();
      updatePreview();
      const pcIframe = document.getElementById("previewIframePc");
      if (pcIframe) await waitForFrameAssets(pcIframe);
      const blob = new Blob(["\ufeff", generateWordHtml()], { type: "application/msword;charset=utf-8" });
      downloadBlob(blob, getExportFileName("doc"));
    });

    panelToggleBtn?.addEventListener("click", () => {
      setEditorPanelCollapsed(!appRoot.classList.contains("panel-collapsed"));
    });

    document.querySelectorAll("[data-editor-mode]").forEach((tab) => {
      tab.addEventListener("click", () => {
        activeEditorMode = tab.dataset.editorMode;
        document.querySelectorAll("[data-editor-mode]").forEach((item) => {
          const isActive = item.dataset.editorMode === activeEditorMode;
          item.classList.toggle("active", isActive);
          item.setAttribute("aria-selected", isActive ? "true" : "false");
        });
        visualEditor.classList.toggle("active", activeEditorMode === "visual");
        sourceEditor.classList.toggle("active", activeEditorMode === "source");
        sourceEditor.hidden = activeEditorMode !== "source";
        visualEditor.hidden = activeEditorMode !== "visual";
        if (activeEditorMode === "source") {
          markdownEditor.value = serializeMarkdown();
          sourceStatus.textContent = "Markdown 已同步";
        }
      });
    });

    document.querySelectorAll("[data-meta-key]").forEach((input) => {
      input.addEventListener("input", syncMarkdownFromEditor);
    });

    sectionList.addEventListener("input", syncMarkdownFromEditor);
    sectionList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-section-action]");
      if (!button) return;
      const item = button.closest(".resume-section-item");
      const index = Number(item?.dataset.index);
      if (!Number.isFinite(index)) return;
      readSectionsFromForm();
      resumeSections.splice(index, 1);
      renderSectionsEditor();
      syncMarkdownFromEditor();
    });

    addSectionBtn.addEventListener("click", () => {
      readSectionsFromForm();
      resumeSections.push({ title: "新章节", body: "" });
      renderSectionsEditor();
      syncMarkdownFromEditor();
      const lastItem = sectionList.querySelector(".resume-section-item:last-child .section-title-input");
      if (lastItem) lastItem.focus();
    });

    customMetaList.addEventListener("input", syncMarkdownFromEditor);
    customMetaList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-meta-action]");
      if (!button) return;
      const item = button.closest(".custom-meta-item");
      const index = Number(item?.dataset.index);
      if (!Number.isFinite(index)) return;
      readCustomMetaFromForm();
      customMetaEntries.splice(index, 1);
      renderCustomMetaEditor();
      syncMarkdownFromEditor();
    });

    addMetaBtn.addEventListener("click", () => {
      readCustomMetaFromForm();
      customMetaEntries.push({ key: "", value: "" });
      renderCustomMetaEditor();
      const lastKey = customMetaList.querySelector(".custom-meta-item:last-child .custom-meta-key");
      if (lastKey) lastKey.focus();
    });

    markdownEditor.addEventListener("input", () => {
      sourceStatus.textContent = "源码有未应用修改";
    });

    applySourceBtn.addEventListener("click", () => {
      applyResumeMarkdown(markdownEditor.value);
      sourceStatus.textContent = "Markdown 已应用";
      updatePreview();
    });

    reloadMdBtn.addEventListener("click", async () => {
      try {
        await loadTemplate(currentTemplateFile);
        updatePreview();
      } catch (error) {
        console.error(error);
        alert(`重新加载失败，请确认 ${currentTemplateFile} 存在且本地服务已启动。`);
      }
    });

    templateSelect?.addEventListener("change", async () => {
      const next = templateSelect.value;
      if (!next || next === currentTemplateFile) return;
      try {
        await loadTemplate(next);
        updatePreview();
      } catch (error) {
        console.error(error);
        templateSelect.value = currentTemplateFile;
        alert(`切换模版失败：${next}`);
      }
    });

    downloadMdBtn.addEventListener("click", () => {
      commitActiveEditor();
      downloadBlob(
        new Blob([markdownContent], { type: "text/markdown;charset=utf-8" }),
        getExportFileName("md")
      );
    });

    mdFile.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      applyResumeMarkdown(text);
      updatePreview();
      e.target.value = "";
    });

    themeSelect.addEventListener("change", () => {
      applyThemeConfig();
      resumeMeta.theme = themeSelect.value;
      syncMarkdownFromEditor();
    });

    async function initApp() {
      initDevices();
      setEditorPanelCollapsed(localStorage.getItem("resume-preview-panel-collapsed") === "1", { skipPersist: true });
      try {
        templateFiles = await discoverResumeTemplates();
        const saved = localStorage.getItem(TEMPLATE_STORAGE_KEY);
        currentTemplateFile = templateFiles.includes(saved) ? saved : (templateFiles[0] || DEFAULT_TEMPLATE);
        renderTemplateSelect();
        await loadTemplate(currentTemplateFile);
        applyThemeConfig();
        updatePreview();
      } catch (error) {
        console.error(error);
        alert(
          "无法加载简历模版。\n\n" +
          "请在本目录启动本地服务后访问，例如：\n" +
          "python3 -m http.server 8080\n" +
          "然后打开 http://localhost:8080/markdown-resume-preview-1.html"
        );
      }
    }

    initApp();
  </script>
</body>
</html>
